<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Vix Registry</title>

    <!-- Primary meta -->
    <meta
      name="description"
      content="Explore the Vix Registry. Search, browse, and publish high-performance C++ modules for the Vix runtime."
    />

    <!-- Favicons -->
    <link rel="icon" href="/assets/pwa/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/pwa/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/pwa/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/assets/pwa/apple-touch-icon.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#0b0e14" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vix Registry" />
    <meta property="og:title" content="Vix Registry" />
    <meta
      property="og:description"
      content="Search, discover, and publish packages for the Vix runtime."
    />
    <meta property="og:url" content="https://registry.vixcpp.com/" />
    <meta
      property="og:image"
      content="https://vixcpp.com/assets/logo/vix-logo.png"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image " />
    <meta name="twitter:title" content="Vix Registry" />
    <meta
      name="twitter:description"
      content="Discover packages for the Vix runtime."
    />
    <meta
      name="twitter:image"
      content="https://vixcpp.com/assets/logo/vix-logo.png"
    />

    <!-- App mount -->
  </head>

  <body>
    <div id="app"></div>

    <!-- App -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
